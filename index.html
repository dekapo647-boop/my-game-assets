<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Japanese Endless Highway</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap');

        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #000; 
            font-family: 'Rajdhani', sans-serif; 
            user-select: none;
            -webkit-user-select: none;
        }

        /* -------------------------------------
           HUD (Head-Up Display) UI Styles
        ------------------------------------- */
        #hud { 
            position: absolute; 
            top: 0; left: 0; width: 100%; height: 100%; 
            pointer-events: none; 
            display: flex; flex-direction: column; justify-content: space-between; 
            padding: 30px; box-sizing: border-box; z-index: 10; 
        }

        .glass-panel { 
            background: rgba(0, 15, 30, 0.65); 
            border: 1px solid rgba(0, 204, 255, 0.3); 
            backdrop-filter: blur(8px); 
            -webkit-backdrop-filter: blur(8px);
            padding: 20px; color: #fff; 
            box-shadow: 0 0 20px rgba(0, 150, 255, 0.15), inset 0 0 10px rgba(0, 204, 255, 0.1); 
            border-radius: 8px; 
            pointer-events: auto; 
        }

        .header { align-self: flex-start; max-width: 350px; }
        .header h1 { margin: 0 0 5px 0; font-size: 26px; color: #0cf; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px rgba(0, 204, 255, 0.6); }
        .header p { margin: 0; font-size: 14px; color: #aaa; letter-spacing: 1px; }
        .status-indicator { margin-top: 12px; font-size: 13px; color: #0f0; display: flex; align-items: center; gap: 8px; font-weight: bold; letter-spacing: 1px;}
        .status-indicator::before { content: ''; display: block; width: 10px; height: 10px; background: #0f0; border-radius: 50%; box-shadow: 0 0 10px #0f0; animation: blink 2s infinite; }

        .bottom-area { display: flex; flex-direction: column; justify-content: flex-end; gap: 20px; width: 100%; pointer-events: none; }
        
        .dashboard-row { display: flex; justify-content: space-between; align-items: flex-end; width: 100%; pointer-events: auto; }
        .action-row { display: flex; justify-content: space-between; align-items: flex-end; width: 100%; pointer-events: auto; }

        .controls-panel { padding: 15px; }
        .control-group { display: flex; flex-direction: column; gap: 8px; }
        .control-label { font-size: 12px; color: #8cf; font-weight: bold; letter-spacing: 2px; }
        .btn-row { display: flex; gap: 10px; }
        
        .btn { 
            background: rgba(0, 150, 255, 0.1); border: 1px solid #0cf; color: #0cf; 
            padding: 12px 20px; font-family: 'Rajdhani', sans-serif; font-size: 16px; font-weight: bold; 
            cursor: pointer; transition: all 0.15s ease-out; text-transform: uppercase; border-radius: 4px; letter-spacing: 1px;
            min-width: 90px;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        .btn:hover { background: rgba(0, 150, 255, 0.3); box-shadow: 0 0 15px rgba(0, 204, 255, 0.5); }
        
        .btn-steer:active, .btn-steer.active { background: rgba(0, 204, 255, 0.4); box-shadow: 0 0 20px rgba(0, 204, 255, 0.6); }
        .btn-accel:active, .btn-accel.active { background: rgba(0, 255, 128, 0.3); border-color: #0f8; color: #0f8; box-shadow: 0 0 20px rgba(0, 255, 128, 0.6); }
        .btn-brake:active, .btn-brake.active { background: rgba(255, 50, 50, 0.3); border-color: #f33; color: #f33; box-shadow: 0 0 20px rgba(255, 50, 50, 0.6); }

        .btn-auto { color: #0f0; border-color: #0f0; }
        .btn-auto:hover { background: rgba(0, 255, 0, 0.2); box-shadow: 0 0 15px rgba(0, 255, 0, 0.4); }
        .btn-auto.active { background: rgba(0, 255, 0, 0.3); box-shadow: 0 0 20px rgba(0, 255, 0, 0.6); color: #fff; text-shadow: 0 0 5px #fff; }

        .meter-panel { display: flex; align-items: center; gap: 20px; padding: 15px 25px; }
        .speedometer { width: 120px; height: 120px; position: relative; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        .speedometer svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: rotate(-90deg); drop-shadow: 0 0 5px #0cf; }
        .speed-ring-bg { fill: none; stroke: rgba(255, 255, 255, 0.1); stroke-width: 8; }
        .speed-ring { fill: none; stroke: #0cf; stroke-width: 8; stroke-linecap: round; stroke-dasharray: 440; stroke-dashoffset: 440; transition: stroke-dashoffset 0.1s linear; }
        
        .speed-value-container { display: flex; flex-direction: column; align-items: center; z-index: 1; margin-top: 5px;}
        .speed-value { font-size: 42px; font-weight: 700; color: #fff; line-height: 0.9; text-shadow: 0 0 15px rgba(0, 204, 255, 0.8); }
        .speed-unit { font-size: 12px; color: #8cf; font-weight: bold; }

        .gear-display { font-size: 36px; font-weight: bold; color: #0cf; width: 40px; text-align: center; border-left: 2px solid rgba(0, 204, 255, 0.3); padding-left: 15px; text-shadow: 0 0 10px rgba(0, 204, 255, 0.5);}

        @keyframes blink { 0%, 100% { opacity: 1; box-shadow: 0 0 10px #0f0;} 50% { opacity: 0.4; box-shadow: none;} }

        /* --- モバイル・縦画面対応 --- */
        @media (max-width: 900px) {
            #hud { padding: 10px; }
            .header h1 { font-size: 18px; }
            .header p { font-size: 12px; }
            .bottom-area { gap: 10px; }
            .dashboard-row { align-items: flex-start; }
            .meter-panel { padding: 10px 15px; gap: 15px; }
            .speedometer { width: 80px; height: 80px; }
            .speed-value { font-size: 28px; }
            .gear-display { font-size: 28px; width: 30px; padding-left: 10px; }
            .controls-panel { padding: 10px; }
            .btn-row { gap: 6px; }
            .btn { padding: 16px 10px; font-size: 14px; min-width: 65px; }
            .control-label { font-size: 10px; }
        }

        @media (max-width: 380px) {
            .btn { min-width: 55px; font-size: 12px; padding: 16px 5px; }
            .meter-panel { padding: 10px; gap: 10px; }
            .speedometer { width: 60px; height: 60px; }
            .speed-value { font-size: 20px; }
            .speed-unit { font-size: 10px; }
            .gear-display { font-size: 20px; width: 20px; }
        }
    </style>
</head>
<body>
    <div id="hud">
        <div class="glass-panel header">
            <h1>K-TRUCK TOUGE RACING</h1>
            <p>CHORO-Q STYLE PROCEDURAL DRIVE</p>
            <div class="status-indicator">SYSTEMS NOMINAL</div>
        </div>

        <div class="bottom-area">
            <div class="dashboard-row">
                <div class="btn-row">
                    <button id="btn-camera" class="btn">CAM: FOLLOW</button>
                    <button id="btn-autopilot" class="btn btn-auto">AUTO: OFF [P]</button>
                </div>
                <div class="glass-panel meter-panel">
                    <div class="speedometer">
                        <svg viewBox="0 0 160 160">
                            <circle class="speed-ring-bg" cx="80" cy="80" r="70"></circle>
                            <circle class="speed-ring" id="speed-ring" cx="80" cy="80" r="70"></circle>
                        </svg>
                        <div class="speed-value-container">
                            <div class="speed-value" id="speed-value">0</div>
                            <div class="speed-unit">KM/H</div>
                        </div>
                    </div>
                    <div class="gear-display" id="gear-display">N</div>
                </div>
            </div>

            <div class="action-row">
                <div class="glass-panel controls-panel">
                    <div class="control-group">
                        <div class="control-label">STEERING</div>
                        <div class="btn-row">
                            <button id="btn-left" class="btn btn-steer">◀ L [A]</button>
                            <button id="btn-right" class="btn btn-steer">R ▶ [D]</button>
                        </div>
                    </div>
                </div>

                <div class="glass-panel controls-panel">
                    <div class="control-group">
                        <div class="control-label">PEDALS</div>
                        <div class="btn-row">
                            <button id="btn-brake" class="btn btn-brake">BRK [S]</button>
                            <button id="btn-accel" class="btn btn-accel">ACC [W]</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Three.js Import Map -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js'; // GLTFLoaderを追加

        // --- 設定パラメータ (日本の道路風に調整) ---
        const CONFIG = {
            carColor: 0xfdfdfd,      // 軽トラのクラシックな白
            roadColor: 0x1a1a1a,     
            grassColor: 0x3b592a,    
            lineYellow: 0xe6a817,    
            lineWhite: 0xffffff,     
            roadWidth: 10,           
            fogColor: 0x87CEEB,      
            
            maxSpeed: 20.0,          
            accel: 10.0,             
            brake: 20.0,             
            friction: 4.0,           
            maxSteerInput: 0.03      
        };

        let scene, camera, renderer, controls, dirLight;
        let carGroup;
        let frontLeftWheel, frontRightWheel;
        let carTires = [];
        let groundMesh;

        const clock = new THREE.Clock();
        let speed = 0;
        let currentSteeringAngle = 0;
        const inputState = { accel: false, brake: false, left: false, right: false };
        let isAutopilot = false; // オートパイロットのフラグ
        
        // --- カメラモード管理 ---
        let cameraMode = 0; // 0: FOLLOW, 1: 1ST PERSON, 2: FREE VIEW
        const CAMERA_MODES = ['CAM: FOLLOW', 'CAM: 1ST PERSON', 'CAM: FREE VIEW'];

        // --- 無限生成チャンク管理 ---
        const activeChunks = new Map();
        const chunkSize = 200;
        const segmentsPerChunk = 20;
        const visibleChunks = 5; // 前方に生成するチャンク数（少し増やして遠景を豊かに）

        // --- パーティクル（火花エフェクト用） ---
        const particles = [];
        const particleCount = 60;

        const uiSpeedValue = document.getElementById('speed-value');
        const uiSpeedRing = document.getElementById('speed-ring');
        const uiGearDisplay = document.getElementById('gear-display');
        const btnAccel = document.getElementById('btn-accel');
        const btnBrake = document.getElementById('btn-brake');
        const btnLeft = document.getElementById('btn-left');
        const btnRight = document.getElementById('btn-right');
        const btnCamera = document.getElementById('btn-camera');
        const btnAutopilot = document.getElementById('btn-autopilot'); // 自動運転ボタン

        // --- 共通マテリアル & ジオメトリ (メモリ最適化) ---
        let roadMat, centerLineMat, sideLineMat, guardrailMat;
        let treeTrunkMat, treeLeafMats = [], houseWallMats = [], houseRoofMats = [], doorMat;
        let poleMat, transMat, guardrailPoleMat;
        let windowMat, foundationMat; // 窓と基礎用マテリアル追加

        let treeTrunkGeo, treeLeafGeo, pineLeafGeo, houseWallGeo, houseRoofGeo, doorGeo;
        let poleGeo, barGeo, transGeo, guardrailPoleGeo;
        let windowGeo; // 窓用ジオメトリ追加

        // GLBモデルを使い回すための変数
        let loadedHouseModel = null;
        const gltfLoader = new GLTFLoader();

        init();
        setupInputHandlers();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(CONFIG.fogColor);
            scene.fog = new THREE.FogExp2(CONFIG.fogColor, 0.005);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.0;
            document.body.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxPolarAngle = Math.PI / 2 - 0.02;

            setupLighting();
            createEnvironment();
            createCar();
            setupParticles();
            
            window.addEventListener('resize', onWindowResize);
        }

        function setupLighting() {
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.9); 
            scene.add(ambientLight);

            dirLight = new THREE.DirectionalLight(0xfffff0, 2.2); 
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            dirLight.shadow.camera.near = 10;
            dirLight.shadow.camera.far = 400;
            dirLight.shadow.camera.left = -100;
            dirLight.shadow.camera.right = 100;
            dirLight.shadow.camera.top = 100;
            dirLight.shadow.camera.bottom = -100;
            dirLight.shadow.bias = -0.0005;

            scene.add(dirLight);
            scene.add(dirLight.target);
        }

        function setupParticles() {
            const pGeo = new THREE.BoxGeometry(0.15, 0.15, 0.15);
            const pMat = new THREE.MeshBasicMaterial({ 
                color: 0xffaa00, 
                transparent: true, 
                opacity: 1.0,
                blending: THREE.AdditiveBlending 
            });
            for(let i = 0; i < particleCount; i++) {
                const p = new THREE.Mesh(pGeo, pMat.clone());
                p.position.set(0, -100, 0);
                p.visible = false;
                scene.add(p);
                particles.push({ mesh: p, life: 0, vel: new THREE.Vector3() });
            }
        }

        function getTrackPoint(z) {
            const x = Math.sin(z * 0.015) * 35 + Math.sin(z * 0.005) * 60 + Math.sin(z * 0.002) * 80;
            return new THREE.Vector3(x, 0, z);
        }

        function getTrackTangent(z) {
            const p1 = getTrackPoint(z);
            const p2 = getTrackPoint(z - 0.5);
            return p2.clone().sub(p1).normalize();
        }

        function createSharedResources() {
            // --- マテリアル ---
            roadMat = new THREE.MeshStandardMaterial({ color: CONFIG.roadColor, roughness: 0.95, metalness: 0.0, side: THREE.DoubleSide });
            centerLineMat = new THREE.MeshBasicMaterial({ color: CONFIG.lineYellow, side: THREE.DoubleSide });
            sideLineMat = new THREE.MeshBasicMaterial({ color: CONFIG.lineWhite, side: THREE.DoubleSide });
            guardrailMat = new THREE.MeshStandardMaterial({ color: 0xdddddd, roughness: 0.5, metalness: 0.4, side: THREE.DoubleSide });

            treeTrunkMat = new THREE.MeshStandardMaterial({ color: 0x4a3b2c, roughness: 0.9 });
            treeLeafMats = [
                new THREE.MeshStandardMaterial({ color: 0x2d4c1e, roughness: 0.8 }),
                new THREE.MeshStandardMaterial({ color: 0x3a5f27, roughness: 0.8 }),
                new THREE.MeshStandardMaterial({ color: 0x4a7331, roughness: 0.8 }),
                new THREE.MeshStandardMaterial({ color: 0x5a632c, roughness: 0.8 }) 
            ];
            
            // 日本の住宅を意識した壁の色に変更（漆喰、モルタル、板張りなどをイメージ）
            houseWallMats = [
                new THREE.MeshStandardMaterial({ color: 0xe8dfc8, roughness: 0.9 }), // 薄いクリーム色・漆喰風
                new THREE.MeshStandardMaterial({ color: 0x9c7c59, roughness: 0.9 }), // 薄い茶色・明るめの板張り風
                new THREE.MeshStandardMaterial({ color: 0xa9a9a9, roughness: 0.9 }), // 落ち着いたグレー・モルタル風
                new THREE.MeshStandardMaterial({ color: 0x5c4033, roughness: 0.9 })  // 濃い茶色・焼杉板風
            ];
            
            houseRoofMats = [
                new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.8 }), 
                new THREE.MeshStandardMaterial({ color: 0x4a5d23, roughness: 0.8 }), 
                new THREE.MeshStandardMaterial({ color: 0x6e2c2c, roughness: 0.8 }), 
                new THREE.MeshStandardMaterial({ color: 0x3c4c66, roughness: 0.8 })  
            ];
            doorMat = new THREE.MeshStandardMaterial({ color: 0x4a3b2c, roughness: 0.9 });
            
            // 窓と基礎のマテリアル
            windowMat = new THREE.MeshStandardMaterial({ color: 0x2a3b4c, roughness: 0.2, metalness: 0.8 });
            foundationMat = new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.9 });

            poleMat = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.9 });
            transMat = new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.7 });
            guardrailPoleMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.5, roughness: 0.5 });

            // --- ジオメトリ (再利用フラグを付ける) ---
            treeTrunkGeo = new THREE.CylinderGeometry(0.3, 0.4, 1, 5);
            treeTrunkGeo.translate(0, 0.5, 0);
            treeTrunkGeo.userData.isShared = true;

            treeLeafGeo = new THREE.DodecahedronGeometry(1, 1);
            treeLeafGeo.userData.isShared = true;

            // 杉・松のような針葉樹用のジオメトリを追加
            pineLeafGeo = new THREE.ConeGeometry(1.5, 2.5, 5);
            pineLeafGeo.translate(0, 1.25, 0);
            pineLeafGeo.userData.isShared = true;

            houseWallGeo = new THREE.BoxGeometry(1, 1, 1);
            houseWallGeo.translate(0, 0.5, 0);
            houseWallGeo.userData.isShared = true;

            houseRoofGeo = new THREE.ConeGeometry(1, 1, 4);
            houseRoofGeo.translate(0, 0.5, 0);
            houseRoofGeo.rotateY(Math.PI / 4);
            houseRoofGeo.userData.isShared = true;

            windowGeo = new THREE.BoxGeometry(1, 1, 1);
            windowGeo.translate(0, 0.5, 0);
            windowGeo.userData.isShared = true;

            doorGeo = new THREE.BoxGeometry(1.2, 2.0, 0.1);
            doorGeo.translate(0, 1.0, 0);
            doorGeo.userData.isShared = true;

            poleGeo = new THREE.CylinderGeometry(0.15, 0.2, 8, 8);
            poleGeo.translate(0, 4, 0);
            poleGeo.userData.isShared = true;

            barGeo = new THREE.BoxGeometry(2.0, 0.1, 0.1);
            barGeo.userData.isShared = true;

            transGeo = new THREE.CylinderGeometry(0.3, 0.3, 0.8, 8);
            transGeo.userData.isShared = true;

            guardrailPoleGeo = new THREE.CylinderGeometry(0.08, 0.08, 0.8, 8);
            guardrailPoleGeo.translate(0, 0.4, 0);
            guardrailPoleGeo.userData.isShared = true;

            // GLBモデルの事前読み込み
            const houseModelUrl = 'https://dekapo647-boop.github.io/my-game-assets/932_house.glb';
            
            // URLがプレースホルダーのままの場合はロードをスキップしてエラーを防ぐ
            if (!houseModelUrl.includes('[あなたのユーザー名]')) {
                gltfLoader.load(
                    houseModelUrl, 
                    function (gltf) {
                        loadedHouseModel = gltf.scene;
                        loadedHouseModel.traverse(function (child) {
                            if (child.isMesh) {
                                child.castShadow = true;
                                child.receiveShadow = true;
                            }
                        });
                        
                        // モデルの大きさが合わない場合はここの数値を変更して調整してください
                        loadedHouseModel.scale.set(1, 1, 1);

                        // --- 追加: モデルのロード完了時に、既存の景色を一度消去して再生成する ---
                        for (const [index, chunk] of activeChunks.entries()) {
                            scene.remove(chunk);
                            disposeHierarchy(chunk);
                        }
                        activeChunks.clear();
                        if (carGroup) {
                            updateChunks(); // GLBモデルを使って景色を作り直す
                        }
                    },
                    undefined,
                    function (error) {
                        console.error('An error happened loading the house model:', error);
                    }
                );
            } else {
                console.warn('GLBモデルのURLが設定されていません。プロシージャル生成の家を使用します。');
            }
        }

        function createEnvironment() {
            createSharedResources(); 

            const planeGeo = new THREE.PlaneGeometry(3000, 3000);
            const planeMat = new THREE.MeshStandardMaterial({ 
                color: CONFIG.grassColor,
                roughness: 1.0,
                metalness: 0.0
            });
            groundMesh = new THREE.Mesh(planeGeo, planeMat);
            groundMesh.rotation.x = -Math.PI / 2;
            groundMesh.position.y = -0.5; 
            groundMesh.receiveShadow = true;
            scene.add(groundMesh);

            updateChunks();
        }

        // --- プロシージャル・オブジェクト生成関数 ---
        function createTree(x, z) {
            const group = new THREE.Group();
            const isPine = Math.random() > 0.5; // 50%の確率で針葉樹にする
            
            const trunkHeight = 1.5 + Math.random() * 1.5;
            const trunk = new THREE.Mesh(treeTrunkGeo, treeTrunkMat);
            trunk.scale.set(0.6, trunkHeight, 0.6);
            trunk.castShadow = true;
            group.add(trunk);

            const leafMat = treeLeafMats[Math.floor(Math.random() * treeLeafMats.length)];

            if (isPine) {
                // 杉/松のような円錐型の重なり
                for (let i = 0; i < 3; i++) {
                    const leaf = new THREE.Mesh(pineLeafGeo, leafMat);
                    const scale = 1.0 - (i * 0.25);
                    leaf.scale.set(scale, scale, scale);
                    leaf.position.y = trunkHeight * 0.4 + (i * 1.0);
                    leaf.castShadow = true;
                    group.add(leaf);
                }
            } else {
                // 広葉樹のような丸い葉の集まり（複数の房を重ねて複雑化）
                const clusters = 3 + Math.floor(Math.random() * 2);
                for (let i = 0; i < clusters; i++) {
                    const leaf = new THREE.Mesh(treeLeafGeo, leafMat);
                    const radius = 1.0 + Math.random() * 0.6;
                    leaf.scale.set(radius, radius * 0.8, radius);
                    leaf.position.set(
                        (Math.random() - 0.5) * 1.2,
                        trunkHeight + 0.2 + Math.random() * 1.0,
                        (Math.random() - 0.5) * 1.2
                    );
                    leaf.castShadow = true;
                    group.add(leaf);
                }
            }

            group.position.set(x, -0.5, z); // 地面(-0.5)に合わせて浮きを解消
            const s = 1.2 + Math.random() * 1.0; // 木のスケールを大きくしてバランスを適正化
            group.scale.set(s, s, s);

            return group;
        }

        function createHouse(x, z, faceDir) {
            const group = new THREE.Group();
            
            // GLBモデルが読み込み完了していればそれを使う
            if (loadedHouseModel) {
                const houseModel = loadedHouseModel.clone();
                group.add(houseModel);
            } else {
                const wallMat = houseWallMats[Math.floor(Math.random() * houseWallMats.length)];
                const roofMat = houseRoofMats[Math.floor(Math.random() * houseRoofMats.length)];

                const houseType = Math.floor(Math.random() * 4);

                const createBlock = (w, h, d, px, pz) => {
                    const b = new THREE.Group();
                    
                    const foundation = new THREE.Mesh(houseWallGeo, foundationMat);
                    foundation.scale.set(w + 0.2, 0.4, d + 0.2);
                    b.add(foundation);

                    const walls = new THREE.Mesh(houseWallGeo, wallMat);
                    walls.scale.set(w, h, d);
                    walls.position.y = 0.4;
                    walls.castShadow = true; 
                    walls.receiveShadow = true;
                    b.add(walls);

                    const roofH = Math.max(1.5, Math.min(w, d) * 0.4);
                    const roof = new THREE.Mesh(houseRoofGeo, roofMat);
                    roof.scale.set(w * 0.75, roofH, d * 0.75); 
                    roof.position.y = 0.4 + h;
                    roof.castShadow = true;
                    b.add(roof);
                    
                    if (w > 3 && h >= 2.5) {
                        const win1 = new THREE.Mesh(windowGeo, windowMat);
                        win1.scale.set(1.5, 1.2, 0.1);
                        win1.position.set(0, 0.4 + h/2 - 0.6, d/2 + 0.05); 
                        b.add(win1);
                    }
                    
                    b.position.set(px, 0, pz);
                    return b;
                };

                let mainW, mainH, mainD;

                if (houseType === 0) {
                    mainW = 6 + Math.random() * 3;
                    mainD = 5 + Math.random() * 2;
                    mainH = 2.5 + Math.random() * 0.5;
                    group.add(createBlock(mainW, mainH, mainD, 0, 0));
                    
                    const door = new THREE.Mesh(doorGeo, doorMat);
                    door.position.set(mainW/3, 0.4, mainD/2 + 0.06);
                    group.add(door);

                } else if (houseType === 1) {
                    mainW = 5 + Math.random() * 2;
                    mainD = 5 + Math.random() * 2;
                    mainH = 5.0 + Math.random() * 1.5;
                    group.add(createBlock(mainW, mainH, mainD, 0, 0));

                    const door = new THREE.Mesh(doorGeo, doorMat);
                    door.position.set(-mainW/4, 0.4, mainD/2 + 0.06);
                    group.add(door);
                    
                    const win2 = new THREE.Mesh(windowGeo, windowMat);
                    win2.scale.set(1.8, 1.2, 0.1);
                    win2.position.set(0, mainH - 1.5, mainD/2 + 0.05);
                    group.add(win2);

                } else if (houseType === 2) {
                    mainW = 7 + Math.random() * 2;
                    mainD = 4 + Math.random() * 2;
                    mainH = 2.5 + Math.random() * 1.0;
                    group.add(createBlock(mainW, mainH, mainD, 0, 0));
                    
                    const subW = 4 + Math.random() * 1;
                    const subD = 4 + Math.random() * 2;
                    group.add(createBlock(subW, mainH, subD, -mainW/2 + subW/2, mainD/2 + subD/2));

                    const door = new THREE.Mesh(doorGeo, doorMat);
                    door.position.set(mainW/4, 0.4, mainD/2 + 0.06);
                    group.add(door);

                } else {
                    mainW = 5 + Math.random() * 2;
                    mainD = 5 + Math.random() * 2;
                    mainH = 5.0 + Math.random() * 1.0;
                    group.add(createBlock(mainW, mainH, mainD, 0, 0));

                    const subW = 3.5 + Math.random() * 1.5;
                    const subH = 2.5 + Math.random() * 0.5;
                    group.add(createBlock(subW, subH, mainD, mainW/2 + subW/2, 0));

                    const door = new THREE.Mesh(doorGeo, doorMat);
                    door.position.set(-mainW/4, 0.4, mainD/2 + 0.06);
                    group.add(door);
                }
            }

            group.position.set(x, -0.5, z); 
            
            const lookTarget = new THREE.Vector3(x, -0.5, z).add(faceDir);
            group.lookAt(lookTarget);

            return group;
        }

        function createUtilityPole(x, z) {
            const group = new THREE.Group();
            
            const pole = new THREE.Mesh(poleGeo, poleMat);
            pole.castShadow = true;
            group.add(pole);

            const bar = new THREE.Mesh(barGeo, poleMat);
            bar.position.y = 7.5;
            bar.castShadow = true;
            group.add(bar);

            const trans = new THREE.Mesh(transGeo, transMat);
            trans.position.set(0.6, 6.5, 0.2);
            trans.castShadow = true;
            group.add(trans);

            group.position.set(x, -0.5, z); 
            return group;
        }

        function createGuardrailPole(x, z) {
            const mesh = new THREE.Mesh(guardrailPoleGeo, guardrailPoleMat);
            mesh.position.set(x, 0, z);
            mesh.castShadow = true;
            return mesh;
        }

        function createChunk(index) {
            const group = new THREE.Group();
            
            const startZ = -index * chunkSize;
            const step = chunkSize / segmentsPerChunk;

            const roadVertices = [];
            const roadIndices = [];
            const centerLineVertices = [];
            const sideLineVertices = [];
            const lineIndices = [];
            const guardrailVertices = [];
            const guardrailIndices = [];

            const hw = CONFIG.roadWidth / 2; 
            const lw = 0.2; 

            // 配置済みオブジェクトの座標を記録して干渉を防ぐ
            const placedObjects = [];
            const checkCollision = (pos, radius) => {
                for (const obj of placedObjects) {
                    if (obj.pos.distanceTo(pos) < obj.radius + radius) return true;
                }
                return false;
            };

            for (let i = 0; i <= segmentsPerChunk; i++) {
                const z = startZ - i * step; 
                const pt = getTrackPoint(z);
                const tangent = getTrackTangent(z);
                const right = new THREE.Vector3().crossVectors(tangent, new THREE.Vector3(0, 1, 0)).normalize();

                // 道路左右エッジ
                const pLeft = pt.clone().add(right.clone().multiplyScalar(hw));
                const pRight = pt.clone().add(right.clone().multiplyScalar(-hw));
                roadVertices.push(pLeft.x, 0.0, pLeft.z);
                roadVertices.push(pRight.x, 0.0, pRight.z);

                // 中央の黄色いライン
                const cLeft = pt.clone().add(right.clone().multiplyScalar(lw));
                const cRight = pt.clone().add(right.clone().multiplyScalar(-lw));
                centerLineVertices.push(cLeft.x, 0.02, cLeft.z);
                centerLineVertices.push(cRight.x, 0.02, cRight.z);

                // 左の白線
                const slOut = pt.clone().add(right.clone().multiplyScalar(hw - 0.3));
                const slIn = pt.clone().add(right.clone().multiplyScalar(hw - 0.3 - lw));
                sideLineVertices.push(slOut.x, 0.02, slOut.z);
                sideLineVertices.push(slIn.x, 0.02, slIn.z);

                // 右の白線
                const srIn = pt.clone().add(right.clone().multiplyScalar(-hw + 0.3 + lw));
                const srOut = pt.clone().add(right.clone().multiplyScalar(-hw + 0.3));
                sideLineVertices.push(srIn.x, 0.02, srIn.z);
                sideLineVertices.push(srOut.x, 0.02, srOut.z);

                // ガードレール
                const grOffset = 0.6;
                const grL = pt.clone().add(right.clone().multiplyScalar(hw + grOffset));
                const grR = pt.clone().add(right.clone().multiplyScalar(-hw - grOffset));
                
                guardrailVertices.push(grL.x, 0.4, grL.z);
                guardrailVertices.push(grL.x, 0.7, grL.z); 
                guardrailVertices.push(grR.x, 0.4, grR.z); 
                guardrailVertices.push(grR.x, 0.7, grR.z); 

                // --- 風景オブジェクトの配置 ---
                if (i > 0 && i < segmentsPerChunk) {
                    // ガードレールのポール
                    if (i % 2 === 0) {
                        group.add(createGuardrailPole(grL.x, grL.z));
                        group.add(createGuardrailPole(grR.x, grR.z));
                    }

                    // 電柱
                    if (i % 8 === 0) {
                        const polePos = pt.clone().add(right.clone().multiplyScalar(hw + 3.0));
                        if (!checkCollision(polePos, 2)) {
                            group.add(createUtilityPole(polePos.x, polePos.z));
                            placedObjects.push({ pos: polePos, radius: 2 });
                        }
                    }

                    // 家 (表示頻度を大幅に上げる)
                    if (i % 5 === 0) { 
                        [1, -1].forEach(dir => {
                            if (Math.random() > 0.4) {  
                                const distance = hw + 8 + Math.random() * 8; 
                                const pos = pt.clone().add(right.clone().multiplyScalar(distance * dir));
                                if (!checkCollision(pos, 9)) { 
                                    group.add(createHouse(pos.x, pos.z, right.clone().multiplyScalar(-dir)));
                                    placedObjects.push({ pos: pos, radius: 9 });
                                }
                            }
                        });
                    }

                    // 森 (木を複数本ランダム配置)
                    for (let k = 0; k < 5; k++) {
                        [1, -1].forEach(dir => {
                            if (Math.random() > 0.3) { 
                                const distance = hw + 5 + Math.random() * 45;
                                const pos = pt.clone().add(right.clone().multiplyScalar(distance * dir));
                                pos.add(tangent.clone().multiplyScalar((Math.random() - 0.5) * step));
                                if (!checkCollision(pos, 3.5)) { 
                                    group.add(createTree(pos.x, pos.z));
                                    placedObjects.push({ pos: pos, radius: 3.5 });
                                }
                            }
                        });
                    }
                }
            }

            for(let i=0; i<segmentsPerChunk; i++) {
                const a = i * 2;
                const b = i * 2 + 1;
                const c = (i * 2 + 2);
                const d = (i * 2 + 3);
                roadIndices.push(a, b, d, a, d, c);

                const lA = i * 2;
                const lB = i * 2 + 1;
                const lC = (i + 1) * 2;
                const lD = (i + 1) * 2 + 1;
                lineIndices.push(lA, lB, lD, lA, lD, lC);

                const gLA = i * 4;
                const gLB = i * 4 + 1;
                const gLC = (i + 1) * 4;
                const gLD = (i + 1) * 4 + 1;
                guardrailIndices.push(gLA, gLB, gLD, gLA, gLD, gLC); 

                const gRA = i * 4 + 2;
                const gRB = i * 4 + 3;
                const gRC = (i + 1) * 4 + 2;
                const gRD = (i + 1) * 4 + 3;
                guardrailIndices.push(gRA, gRB, gRD, gRA, gRD, gRC); 
            }

            const roadGeo = new THREE.BufferGeometry();
            roadGeo.setAttribute('position', new THREE.Float32BufferAttribute(roadVertices, 3));
            roadGeo.setIndex(roadIndices);
            roadGeo.computeVertexNormals();
            roadGeo.computeBoundingSphere(); 
            
            const roadMesh = new THREE.Mesh(roadGeo, roadMat); 
            roadMesh.receiveShadow = true;
            group.add(roadMesh);

            const centerGeo = new THREE.BufferGeometry();
            centerGeo.setAttribute('position', new THREE.Float32BufferAttribute(centerLineVertices, 3));
            centerGeo.setIndex(lineIndices);
            centerGeo.computeBoundingSphere();
            group.add(new THREE.Mesh(centerGeo, centerLineMat)); 

            const sideGeo = new THREE.BufferGeometry();
            sideGeo.setAttribute('position', new THREE.Float32BufferAttribute(sideLineVertices, 3));
            
            const sideIndices = [];
            for(let i=0; i<segmentsPerChunk; i++) {
                const bIdx = i * 4;
                const nIdx = (i + 1) * 4;
                sideIndices.push(bIdx, bIdx+1, nIdx+1, bIdx, nIdx+1, nIdx);
                sideIndices.push(bIdx+2, bIdx+3, nIdx+3, bIdx+2, nIdx+3, nIdx+2);
            }
            sideGeo.setIndex(sideIndices);
            sideGeo.computeBoundingSphere();
            group.add(new THREE.Mesh(sideGeo, sideLineMat)); 

            const grGeo = new THREE.BufferGeometry();
            grGeo.setAttribute('position', new THREE.Float32BufferAttribute(guardrailVertices, 3));
            grGeo.setIndex(guardrailIndices);
            grGeo.computeVertexNormals();
            grGeo.computeBoundingSphere();
            const grMesh = new THREE.Mesh(grGeo, guardrailMat); 
            grMesh.castShadow = true;
            grMesh.receiveShadow = true;
            group.add(grMesh);

            return group;
        }

        function disposeHierarchy(node) {
            node.traverse(child => {
                if (child.isMesh) {
                    // 共通ジオメトリ（userData.isSharedがtrue）は破棄しないように保護
                    if (child.geometry && child.geometry.userData.isShared !== true) {
                        child.geometry.dispose();
                    }
                }
            });
        }

        function updateChunks() {
            if (!carGroup) return;

            const currentIndex = Math.floor(-carGroup.position.z / chunkSize);
            const requiredChunks = [];
            for (let i = -1; i <= visibleChunks; i++) {
                requiredChunks.push(currentIndex + i);
            }
            
            for (const [index, chunk] of activeChunks.entries()) {
                if (!requiredChunks.includes(index)) {
                    scene.remove(chunk);
                    disposeHierarchy(chunk);
                    activeChunks.delete(index);
                }
            }
            
            for (const index of requiredChunks) {
                if (!activeChunks.has(index)) {
                    const chunk = createChunk(index);
                    scene.add(chunk);
                    activeChunks.set(index, chunk);
                }
            }

            if (groundMesh) {
                groundMesh.position.x = carGroup.position.x;
                groundMesh.position.z = carGroup.position.z;
            }
        }

        function createCar() {
            carGroup = new THREE.Group();

            // 車体（ボディ）だけを揺らすための内側のグループ
            const bodyGroup = new THREE.Group();
            carGroup.add(bodyGroup);
            carGroup.userData.bodyGroup = bodyGroup; 

            // --- 軽トラ用のマテリアル ---
            const bodyMat = new THREE.MeshStandardMaterial({ 
                color: CONFIG.carColor, 
                roughness: 0.3, 
                metalness: 0.1,
                clearcoat: 0.5 
            });
            const blackMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.9 });
            const glassMat = new THREE.MeshPhysicalMaterial({ 
                color: 0x111111, metalness: 0.9, roughness: 0.0, 
                transparent: true, opacity: 0.8
            });

            // 1. キャビン（運転席：高くて四角い）
            const cabinGeo = new THREE.BoxGeometry(1.6, 1.4, 1.2);
            const cabin = new THREE.Mesh(cabinGeo, bodyMat);
            cabin.position.set(0, 1.3, -0.6); // 前寄り
            cabin.castShadow = true;
            bodyGroup.add(cabin);

            // フロントガラス
            const windGeo = new THREE.BoxGeometry(1.4, 0.7, 0.1);
            const windshield = new THREE.Mesh(windGeo, glassMat);
            windshield.position.set(0, 1.45, -1.21);
            bodyGroup.add(windshield);

            // サイドガラス
            const sideGeo = new THREE.BoxGeometry(1.62, 0.7, 0.8);
            const sideWin = new THREE.Mesh(sideGeo, glassMat);
            sideWin.position.set(0, 1.45, -0.6);
            bodyGroup.add(sideWin);

            // 2. 荷台（後ろの低い部分）
            const bedGeo = new THREE.BoxGeometry(1.6, 0.3, 1.8);
            const bed = new THREE.Mesh(bedGeo, bodyMat);
            bed.position.set(0, 0.75, 0.9); 
            bed.castShadow = true;
            bodyGroup.add(bed);

            // 荷台の枠（アオリ）
            const sideBoardGeo = new THREE.BoxGeometry(0.1, 0.3, 1.8);
            const boardL = new THREE.Mesh(sideBoardGeo, bodyMat);
            boardL.position.set(-0.75, 1.05, 0.9);
            const boardR = new THREE.Mesh(sideBoardGeo, bodyMat);
            boardR.position.set(0.75, 1.05, 0.9);
            
            const rearBoardGeo = new THREE.BoxGeometry(1.6, 0.3, 0.1);
            const boardB = new THREE.Mesh(rearBoardGeo, bodyMat);
            boardB.position.set(0, 1.05, 1.75);

            bodyGroup.add(boardL, boardR, boardB);

            // 3. 荷台の荷物（みかん箱風ダンボール）
            const boxGeo = new THREE.BoxGeometry(0.6, 0.5, 0.6);
            const boxMat = new THREE.MeshStandardMaterial({ color: 0xc29b62, roughness: 0.9 });
            const box1 = new THREE.Mesh(boxGeo, boxMat);
            box1.position.set(-0.3, 1.15, 0.6);
            box1.rotation.y = 0.2;
            box1.castShadow = true;
            const box2 = new THREE.Mesh(boxGeo, boxMat);
            box2.position.set(0.2, 1.15, 1.2);
            box2.rotation.y = -0.1;
            box2.castShadow = true;
            bodyGroup.add(box1, box2);

            // フロントバンパー
            const bumperGeo = new THREE.BoxGeometry(1.6, 0.2, 0.2);
            const bumper = new THREE.Mesh(bumperGeo, blackMat);
            bumper.position.set(0, 0.6, -1.25);
            bodyGroup.add(bumper);

            // 4. タイヤ（チョロQ風に少し太くて小さめ）
            const tireGeo = new THREE.CylinderGeometry(0.35, 0.35, 0.3, 20); 
            const tireMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 });
            const rimGeo = new THREE.CylinderGeometry(0.2, 0.2, 0.32, 12);
            const rimMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.5, roughness: 0.5 });

            const tirePositions = [
                { x: -0.85, y: 0.35, z: -0.7 }, // Front Left
                { x: 0.85, y: 0.35, z: -0.7 },  // Front Right
                { x: -0.85, y: 0.35, z: 1.1 },  // Rear Left
                { x: 0.85, y: 0.35, z: 1.1 }    // Rear Right
            ];

            tirePositions.forEach((pos, index) => {
                const wheelGroup = new THREE.Group();
                wheelGroup.position.set(pos.x, pos.y, pos.z);

                const spinGroup = new THREE.Group();
                wheelGroup.add(spinGroup);

                const tire = new THREE.Mesh(tireGeo, tireMat);
                tire.rotation.z = Math.PI / 2;
                tire.castShadow = true;
                spinGroup.add(tire);
                
                const rim = new THREE.Mesh(rimGeo, rimMat);
                rim.rotation.z = Math.PI / 2;
                spinGroup.add(rim);

                carGroup.add(wheelGroup);
                carTires.push(spinGroup); 

                if (index === 0) frontLeftWheel = wheelGroup;
                if (index === 1) frontRightWheel = wheelGroup;
            });

            // 5. ヘッドライト（丸目）
            const lightGeo = new THREE.CylinderGeometry(0.18, 0.18, 0.1, 16);
            const headLightMat = new THREE.MeshStandardMaterial({ color: 0xffffee, emissive: 0xffffee, emissiveIntensity: 2 });
            
            const hlL = new THREE.Mesh(lightGeo, headLightMat);
            hlL.rotation.x = Math.PI / 2;
            hlL.position.set(-0.55, 0.9, -1.21); 
            
            const hlR = new THREE.Mesh(lightGeo, headLightMat);
            hlR.rotation.x = Math.PI / 2;
            hlR.position.set(0.55, 0.9, -1.21);
            
            bodyGroup.add(hlL, hlR);

            // 6. テールランプ（四角）
            const tailGeo = new THREE.BoxGeometry(0.25, 0.15, 0.1);
            const tailLightMat = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xff0000, emissiveIntensity: 1.5 });
            
            const tlL = new THREE.Mesh(tailGeo, tailLightMat);
            tlL.position.set(-0.55, 0.8, 1.8);
            
            const tlR = new THREE.Mesh(tailGeo, tailLightMat);
            tlR.position.set(0.55, 0.8, 1.8);
            
            bodyGroup.add(tlL, tlR);

            // 初期位置の設定
            const startPt = getTrackPoint(0);
            const startTangent = getTrackTangent(0);
            const startRight = new THREE.Vector3().crossVectors(startTangent, new THREE.Vector3(0, 1, 0)).normalize();
            
            // 左車線の中央に初期配置する (rightベクトルに対してマイナス方向)
            carGroup.position.copy(startPt).add(startRight.multiplyScalar(-CONFIG.roadWidth / 4));
            carGroup.position.y = 0;
            
            const lookTarget = carGroup.position.clone().sub(startTangent);
            carGroup.lookAt(lookTarget);

            scene.add(carGroup);
        }

        function setupInputHandlers() {
            const updateUIState = (type, state) => {
                inputState[type] = state;
                let btn;
                if(type === 'accel') btn = btnAccel;
                if(type === 'brake') btn = btnBrake;
                if(type === 'left') btn = btnLeft;
                if(type === 'right') btn = btnRight;
                
                if (btn) {
                    if (state) btn.classList.add('active');
                    else btn.classList.remove('active');
                }
            };

            window.addEventListener('keydown', e => {
                if (e.key === 'w' || e.key === 'W' || e.key === 'ArrowUp') updateUIState('accel', true);
                if (e.key === 's' || e.key === 'S' || e.key === 'ArrowDown') updateUIState('brake', true);
                if (e.key === 'a' || e.key === 'A' || e.key === 'ArrowLeft') updateUIState('left', true);
                if (e.key === 'd' || e.key === 'D' || e.key === 'ArrowRight') updateUIState('right', true);
            });
            window.addEventListener('keyup', e => {
                if (e.key === 'p' || e.key === 'P') btnAutopilot.click(); // Pキーで自動運転切り替え
                if (e.key === 'w' || e.key === 'W' || e.key === 'ArrowUp') updateUIState('accel', false);
                if (e.key === 's' || e.key === 'S' || e.key === 'ArrowDown') updateUIState('brake', false);
                if (e.key === 'a' || e.key === 'A' || e.key === 'ArrowLeft') updateUIState('left', false);
                if (e.key === 'd' || e.key === 'D' || e.key === 'ArrowRight') updateUIState('right', false);
            });

            const preventAndSet = (elem, type, state) => {
                elem.addEventListener('mousedown', () => updateUIState(type, state));
                elem.addEventListener('touchstart', (e) => { e.preventDefault(); updateUIState(type, state); }, {passive: false});
                elem.addEventListener('mouseup', () => updateUIState(type, !state));
                elem.addEventListener('mouseleave', () => updateUIState(type, !state));
                elem.addEventListener('touchend', (e) => { e.preventDefault(); updateUIState(type, !state); }, {passive: false});
                elem.addEventListener('touchcancel', (e) => { e.preventDefault(); updateUIState(type, !state); }, {passive: false});
            };

            preventAndSet(btnAccel, 'accel', true);
            preventAndSet(btnBrake, 'brake', true);
            preventAndSet(btnLeft, 'left', true);
            preventAndSet(btnRight, 'right', true);

            btnCamera.addEventListener('click', () => {
                cameraMode = (cameraMode + 1) % 3;
                btnCamera.innerText = CAMERA_MODES[cameraMode];
                if (cameraMode === 2) {
                    controls.target.copy(carGroup.position);
                }
            });

            // 自動運転ボタンのイベント
            btnAutopilot.addEventListener('click', () => {
                isAutopilot = !isAutopilot;
                btnAutopilot.innerText = isAutopilot ? 'AUTO: ON [P]' : 'AUTO: OFF [P]';
                if (isAutopilot) {
                    btnAutopilot.classList.add('active');
                } else {
                    btnAutopilot.classList.remove('active');
                }
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function updateHUD(currentSpeed) {
            const kmh = Math.abs(currentSpeed * 3); 
            uiSpeedValue.innerText = kmh.toFixed(0);

            const maxKmh = 60.0; 
            const progress = Math.min(kmh / maxKmh, 1.0);
            const maxOffset = 440; 
            const currentOffset = maxOffset - (maxOffset * progress);
            uiSpeedRing.style.strokeDashoffset = currentOffset;

            let gear = 'N';
            if (currentSpeed > 0.1) {
                if (kmh > 50) gear = '5';
                else if (kmh > 40) gear = '4';
                else if (kmh > 25) gear = '3';
                else if (kmh > 10) gear = '2';
                else gear = '1';
            } else if (currentSpeed < -0.1) {
                gear = 'R';
            }
            uiGearDisplay.innerText = gear;
        }

        function animate() {
            requestAnimationFrame(animate);

            const delta = Math.min(clock.getDelta(), 0.1); 

            // --- 速度制御（アクセル・ブレーキ・自動運転） ---
            if (isAutopilot) {
                // 自動運転時は最高速度の85%を目標速度として巡航（クルーズコントロール）
                const targetSpeed = CONFIG.maxSpeed * 0.85;
                if (speed < targetSpeed) {
                    speed += CONFIG.accel * delta * 0.4; // マイルドな加速
                } else {
                    speed -= CONFIG.friction * delta * 0.4;
                }
            } else {
                if (inputState.accel) {
                    speed += CONFIG.accel * delta;
                } else if (inputState.brake) {
                    speed -= CONFIG.brake * delta;
                } else {
                    if (speed > 0) {
                        speed -= CONFIG.friction * delta;
                        if (speed < 0) speed = 0;
                    } else if (speed < 0) {
                        speed += CONFIG.friction * delta;
                        if (speed > 0) speed = 0;
                    }
                }
            }
            speed = Math.max(-CONFIG.maxSpeed * 0.4, Math.min(speed, CONFIG.maxSpeed));
            if (Math.abs(speed) < 0.1 && !inputState.accel && !inputState.brake && !isAutopilot) speed = 0;

            let steerInput = 0;
            if (isAutopilot) {
                // --- オートパイロット（Pure Pursuit アルゴリズム） ---
                // 速度に応じた適切な先読み距離を計算
                const lookAheadDist = 8.0 + (speed * 0.7);
                const lookAheadZ = carGroup.position.z - lookAheadDist;
                
                // 未来のコース上の中心点と接線を計算
                const futureCenterPt = getTrackPoint(lookAheadZ);
                const futureTangent = getTrackTangent(lookAheadZ);
                const futureRight = new THREE.Vector3().crossVectors(futureTangent, new THREE.Vector3(0, 1, 0)).normalize();
                
                // 未来の目標座標（左車線の中央）
                // futureRight は進行方向に対して右側を向くベクトルなので、マイナスをかけて左側にする
                const targetOffset = -CONFIG.roadWidth / 4;
                const targetPos = futureCenterPt.clone().add(futureRight.clone().multiplyScalar(targetOffset));
                
                // 車のローカル座標系から見た目標座標の相対位置を計算
                const localTarget = carGroup.worldToLocal(targetPos.clone());
                
                // 目標への角度を計算
                // Three.jsでは正面が-Z、左が-X。ステアリングは左がプラス(+)なので符号を反転
                const targetAngle = Math.atan2(-localTarget.x, -localTarget.z);
                
                // 目標の角度に向かって滑らかにステアリングを切る
                steerInput = targetAngle * 3.0;

                // 自動運転中でも手動入力があれば上書き可能にする（運転支援）
                if (inputState.left) steerInput += 0.8;
                if (inputState.right) steerInput -= 0.8;

                steerInput = Math.max(-1, Math.min(1, steerInput));
            } else {
                if (inputState.left) steerInput = 1;   
                if (inputState.right) steerInput = -1; 
            }

            const targetSteering = steerInput * CONFIG.maxSteerInput;
            currentSteeringAngle = THREE.MathUtils.lerp(currentSteeringAngle, targetSteering, 10 * delta);

            if (Math.abs(speed) > 0.1) {
                const dir = speed > 0 ? 1 : -1;
                const turnSpeed = currentSteeringAngle * 30 * delta * dir;
                carGroup.rotation.y += turnSpeed; 
            }

            carGroup.translateZ(-speed * delta);

            const centerPt = getTrackPoint(carGroup.position.z);
            const tangent = getTrackTangent(carGroup.position.z);
            const right = new THREE.Vector3().crossVectors(tangent, new THREE.Vector3(0, 1, 0)).normalize();
            
            const diff = new THREE.Vector3().subVectors(carGroup.position, centerPt);
            const offset = diff.dot(right);
            
            const maxOffset = (CONFIG.roadWidth / 2) - 1.2;

            if (Math.abs(offset) > maxOffset) {
                const sign = Math.sign(offset);
                const correctionMagnitude = Math.abs(offset) - maxOffset;
                
                const correctionVec = right.clone().multiplyScalar(sign * correctionMagnitude);
                carGroup.position.sub(correctionVec);
                
                speed *= 0.85; 

                if (Math.abs(speed) > 10 && Math.random() > 0.3) {
                    for(let i=0; i<3; i++) {
                        const p = particles.find(pt => pt.life <= 0);
                        if (p) {
                            const sparkPos = new THREE.Vector3(sign * 1.0, 0.2, -1.5).applyMatrix4(carGroup.matrixWorld);
                            p.mesh.position.copy(sparkPos);
                            p.mesh.visible = true;
                            p.life = 1.0;
                            
                            const sparkVel = tangent.clone().multiplyScalar(-speed * 0.2).add(
                                new THREE.Vector3((Math.random()-0.5)*5, Math.random()*8 + 2, (Math.random()-0.5)*5)
                            );
                            p.vel.copy(sparkVel);
                            p.mesh.material.color.setHSL(0.1 + Math.random()*0.1, 1.0, 0.6); 
                        }
                    }
                }
            }

            particles.forEach(p => {
                if (p.life > 0) {
                    p.life -= delta * 3.0; 
                    p.mesh.position.addScaledVector(p.vel, delta);
                    p.vel.y -= 20 * delta; 
                    p.mesh.material.opacity = p.life;
                    if (p.life <= 0) p.mesh.visible = false;
                }
            });

            updateChunks();

            if (dirLight && carGroup) {
                dirLight.position.set(carGroup.position.x - 50, 100, carGroup.position.z - 50);
                dirLight.target.position.copy(carGroup.position);
            }

            frontLeftWheel.rotation.y = currentSteeringAngle * 25; 
            frontRightWheel.rotation.y = currentSteeringAngle * 25;

            carTires.forEach(spinGroup => {
                spinGroup.rotateX(speed * delta * 2.5);
            });

            // --- 車体（ボディ）のアニメーション（ポヨンポヨン揺れ ＆ ロール） ---
            if (carGroup.userData.bodyGroup) {
                const body = carGroup.userData.bodyGroup;
                
                // サスペンション風の上下の揺れ
                const bounceSpeed = speed * 2.5;
                const bounceAmount = Math.abs(speed) > 0.5 ? Math.sin(clock.getElapsedTime() * bounceSpeed) * 0.04 : 0;
                body.position.y = bounceAmount;

                // カーブ時の遠心力による傾き（ロール）
                const targetRoll = currentSteeringAngle * (Math.abs(speed) / CONFIG.maxSpeed) * 0.6;
                body.rotation.z = THREE.MathUtils.lerp(body.rotation.z, targetRoll, 8.0 * delta);
            }

            // --- カメラ制御の分岐 ---
            if (cameraMode === 0) {
                // FOLLOW: 車の後方上空からの追従
                const relativeCameraOffset = new THREE.Vector3(0, 5, 12);
                const cameraDest = carGroup.localToWorld(relativeCameraOffset);
                
                camera.position.lerp(cameraDest, 8.0 * delta);
                
                const lookAtOffset = new THREE.Vector3(0, 1.5, -15);
                const lookAtDest = carGroup.localToWorld(lookAtOffset);
                
                const targetRotation = new THREE.Quaternion().setFromRotationMatrix(
                    new THREE.Matrix4().lookAt(camera.position, lookAtDest, camera.up)
                );
                camera.quaternion.slerp(targetRotation, 10.0 * delta);
            } else if (cameraMode === 1) {
                // 1ST PERSON: フロントバンパー視点（自車が映らない位置）
                const relativeCameraOffset = new THREE.Vector3(0, 1.0, -1.8);
                const cameraDest = carGroup.localToWorld(relativeCameraOffset);
                
                // 一人称視点は酔い防止と操作性のため、位置を即座に同期させる
                camera.position.copy(cameraDest);
                
                const lookAtOffset = new THREE.Vector3(0, 1.0, -20);
                const lookAtDest = carGroup.localToWorld(lookAtOffset);
                
                // 視線の向きは少しだけ滑らかに補間して振動を和らげる
                const targetRotation = new THREE.Quaternion().setFromRotationMatrix(
                    new THREE.Matrix4().lookAt(camera.position, lookAtDest, camera.up)
                );
                camera.quaternion.slerp(targetRotation, 20.0 * delta);
            } else {
                // FREE VIEW: ドラッグで自由に視点移動
                controls.update();
            }

            updateHUD(speed);
            renderer.render(scene, camera);
        }
    </script>
